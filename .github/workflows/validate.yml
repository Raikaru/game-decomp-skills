name: Validate Skills

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Smoke test packaged scripts and templates
        shell: pwsh
        run: ./scripts/smoke-test.ps1
